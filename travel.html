        .back-to-top {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #666;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .back-to-top:hover {
            opacity: 1;
        }

            visibility: visible;
        }
        .tags-container {

        .tag:hover {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
            transform: translateY(-2px);

            display: block;
            animation: fadeIn 0.5s ease;

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }

        .place-title {
            color: #2c3e50;

            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;

            border: none;

        .photo-popup-caption {

            const photo = photoData[photoKey];

                popupImage.alt = photoKey;
                popupCaption.textContent = photo.caption;
                photoPopup.classList.add('active');
            }
        }

            photoPopup.classList.remove('active');
        });

        photoPopup.addEventListener('click', (e) => {
            if (e.target === photoPopup) {
                photoPopup.classList.remove('active');
            }
        });

        const chartDom = document.getElementById('echarts-map');
        const myChart = echarts.init(chartDom);
        
        echarts.registerMap('world_china', worldChinaMap);

        function getMapOption(data) {
            return {
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(255, 255, 255, 0.95)',
                    borderColor: '#ccc',
                    borderWidth: 1,
                    padding: 10,
                    textStyle: {
                        color: '#333'
                    },
                    formatter: function (params) {
                        if (params.seriesType === 'effectScatter') {
                            const photo = photoData[params.data.name];
                            if (photo) {
                                return `
                                    <div style="text-align: center; max-width: 200px;">
                                        <div style="font-weight: bold; margin-bottom: 8px;">${params.data.name}</div>
                                        <img src="${photo.image}" style="max-width: 100%; max-height: 150px; border-radius: 4px; object-fit: cover;">
                                    </div>
                                `;
                            }
                            return params.data.name;
                        }
                        return params.name;
                    }
                },
                geo: {
                    map: 'world_china',
                    roam: true,
                    zoom: 1.5,
                    center: [80, 35], // Focus on Eurasia
                    itemStyle: {
                        areaColor: '#dcdde1', // Gray for unvisited
                        borderColor: '#ffffff',
                        borderWidth: 0.5
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: '#bdc3c7'
                        },
                        label: {
                            show: false
                        }
                    },
                    regions: visitedRegions
                },
                series: [
                    {
                        type: 'effectScatter',
                        coordinateSystem: 'geo',
                        data: data,
                        symbolSize: 8,
                        showEffectOn: 'render',
                        rippleEffect: {
                            brushType: 'stroke',
                            scale: 4
                        },
                        itemStyle: {
                            color: '#e74c3c',
                            shadowBlur: 10,
                            shadowColor: '#333'
                        },
                        emphasis: {
                            scale: true
                        }
                    }
                ]
            };
        }

        myChart.setOption(getMapOption(visitedCities));

        myChart.on('click', function(params) {
            if (params.seriesType === 'effectScatter') {
                const title = params.data.name;
                
                // Open photo popup
                openPhotoPopup(title);
            }
        });

        window.addEventListener('resize', function() {
            myChart.resize();
