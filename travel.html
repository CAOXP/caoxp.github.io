                            }
                            return params.data.name;
                        }
                        return params.name;
                    }
                },
                geo: {
                    map: 'world_china',
                    roam: true,
                    // Auto-fit to the bounds of the points
                    boundingCoords: [
                        // [lng, lat]
                        // Left-Bottom (min longitude, min latitude)
                        [-10, -20], // Rough estimate to include Europe/Africa and Oceania
                        // Right-Top (max longitude, max latitude)
                        [180, 65]
                    ],
                    itemStyle: {
                        areaColor: '#dcdde1', // Gray for unvisited
                        borderColor: '#ffffff',
                        borderWidth: 0.5
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: '#bdc3c7'
                        },
                        label: {
                            show: false
                        }
                    },
                    regions: visitedRegions
                },
                series: [
                    {
                        name: 'Cities',
                        type: 'scatter',
                        coordinateSystem: 'geo',
                        data: data,
                        symbolSize: 8,
                        itemStyle: {
                            color: '#e74c3c',
                            borderColor: '#fff',
                            borderWidth: 1,
                            shadowBlur: 2,
                            shadowColor: 'rgba(0,0,0,0.5)'
                        },
                        label: {
                            show: false
                        }
                    }
                ]
            };
        }

        myChart.setOption(getMapOption(visitedCities));

        myChart.on('click', function(params) {
            if (params.seriesType === 'scatter') {
                const title = params.data.name;
                
                // Open photo popup
                openPhotoPopup(title);
            }
        });

        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
</body>
</html>
