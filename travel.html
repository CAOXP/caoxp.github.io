            { name: 'Taiyuan', value: [112.5489, 37.8706], target: 'china' },
            { name: 'Xi\'an', value: [108.9398, 34.3413], target: 'china' },
            { name: 'Guiyang', value: [106.6302, 26.6477], target: 'china' },
            { name: 'Xiamen', value: [118.0894, 24.4798], target: 'china' },
            { name: 'Shenyang', value: [123.4315, 41.8057], target: 'china' }
        ];

        function getMapOption(data) {
            return {
                title: {
                    text: 'All photos taken by caoxp',
                    left: '10',
                    bottom: '10',
                    textStyle: {
                        color: '#666',
                        fontSize: 12,
                        fontWeight: 'normal',
                        fontStyle: 'italic'
                    }
                },
                tooltip: {
                    trigger: 'item',
                    backgroundColor: 'rgba(255, 255, 255, 0.95)',
                    borderColor: '#ccc',
                    borderWidth: 1,
                    padding: 10,
                    textStyle: {
                        color: '#333'
                    },
                    formatter: function (params) {
                        if (params.seriesType === 'scatter') {
                            const photo = photoData[params.data.name];
                            if (photo && photo.images && photo.images.length > 0) {
                                const imagesHtml = photo.images.map(img => 
                                    '<img src="' + img + '" style="max-width: 100%; max-height: 150px; border-radius: 4px; object-fit: cover; margin-bottom: 5px; display: block;">'
                                ).join('');
                                
                                return `
                                    <div style="text-align: center; max-width: 200px; max-height: 350px; overflow-y: auto;">
                                        <div style="font-weight: bold; margin-bottom: 8px;">${params.data.name}</div>
                                        ${imagesHtml}
                                    </div>
                                `;
                            }
                            return params.data.name;
                        }
                        if (!visibleRegionNames.has(params.name)) {
                            return null;
                        }
                        return regionNameMap[params.name] || params.name;
                    }
                },
                geo: {
                    map: 'world_china',
                    roam: true,
                    // Auto-fit to the bounds of the points
                    boundingCoords: [
                        // [lng, lat]
                        // Left-Bottom (min longitude, min latitude)
                        [-10, -20], // Rough estimate to include Europe/Africa and Oceania
                        // Right-Top (max longitude, max latitude)
                        [180, 65]
                    ],
                    itemStyle: {
                        areaColor: '#dcdde1', // Gray for unvisited
                        borderColor: '#ffffff',
                        borderWidth: 0.5
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: '#bdc3c7'
                        },
                        label: {
                            show: false
                        }
                    },
                    regions: [...visitedRegions, ...nonInteractiveRegions]
                },
                series: [
                    {
                        name: 'Cities',
                        type: 'scatter',
                        coordinateSystem: 'geo',
                        data: data,
                        symbolSize: 8,
                        itemStyle: {
                            color: '#e74c3c',
                            borderColor: '#fff',
                            borderWidth: 1,
                            shadowBlur: 2,
                            shadowColor: 'rgba(0,0,0,0.5)'
                        },
                        label: {
                            show: false
                        }
                    }
                ]
            };
        }

        myChart.setOption(getMapOption(visitedCities));

        myChart.on('click', function(params) {
            if (params.seriesType === 'scatter') {
                const title = params.data.name;
                
                // Open photo popup
                openPhotoPopup(title);
            }
        });

        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
